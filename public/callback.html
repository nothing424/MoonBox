<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoonBox</title>
  <link rel="icon" type="image/png" href="https://files.catbox.moe/vwr8lu.png">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .cb-box{text-align:center;background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--glass-border);border-radius:var(--radius2);padding:48px 40px;max-width:380px;width:90%;box-shadow:var(--shadow)}
    .cb-icon{font-size:3rem;margin-bottom:20px}
    .cb-title{font-size:1.3rem;font-weight:800;margin-bottom:8px}
    .cb-sub{color:var(--text2);font-size:.9rem}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto 0}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="cb-box">
  <div class="cb-icon" id="cbIcon">&#x1F511;</div>
  <div class="cb-title" id="cbTitle">Memproses Login...</div>
  <div class="cb-sub" id="cbSub">Mohon tunggu sebentar</div>
  <div class="spinner" id="cbSpinner"></div>
</div>
<script>
(async () => {
  function setStatus(icon, title, sub) {
    document.getElementById('cbIcon').textContent = icon;
    document.getElementById('cbTitle').textContent = title;
    document.getElementById('cbSub').textContent = sub;
    document.getElementById('cbSpinner').style.display = 'none';
  }

  try {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const qParams = new URLSearchParams(window.location.search);

    const accessToken = params.get('access_token') || qParams.get('access_token');
    const refreshToken = params.get('refresh_token') || qParams.get('refresh_token');
    const expiresAt = params.get('expires_at') || qParams.get('expires_at');
    const errorDesc = params.get('error_description') || qParams.get('error_description');

    if (errorDesc) {
      setStatus('\u274C', 'Login Ditolak', errorDesc);
      setTimeout(() => window.location.href = '/', 3000);
      return;
    }

    if (!accessToken) {
      setStatus('\u26A0\uFE0F', 'Token Tidak Ditemukan', 'Coba login ulang.');
      setTimeout(() => window.location.href = '/', 3000);
      return;
    }

    const res = await fetch('/api/auth?action=me', {
      headers: { 'Authorization': 'Bearer ' + accessToken }
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('av_session', JSON.stringify({
        user: data.user,
        token: accessToken,
        refreshToken: refreshToken || '',
        expiresAt: expiresAt ? parseInt(expiresAt) : Math.floor(Date.now()/1000) + 3600
      }));
      setStatus('\u2705', 'Login Berhasil!', 'Selamat datang, ' + data.user.username);
      setTimeout(() => window.location.href = '/', 1200);
    } else {
      throw new Error(data.error || 'Verifikasi gagal');
    }
  } catch(e) {
    setStatus('\u274C', 'Verifikasi Gagal', e.message);
    setTimeout(() => window.location.href = '/', 3000);
  }
})();
</script>
</body>
</html>
